<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y.Stage 4</title>
    <link rel="stylesheet" href="../css/select.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>赛制</h1>
      </header>
      <main>
        <section aria-labelledby="group-selection">
          <h2 id="group-selection" class="sr-only">选择赛制</h2>
          <button class="group1-pre-btn" aria-label="选择一年内组第二章节">
            Rookies I
          </button>
          <button class="group1-btn" aria-label="选择一年加组">Prof</button>
          <button class="group2-btn" aria-label="选择一年内组">
            Rookies II
          </button>
          <button class="group-battle-btn" aria-label="选择团体赛">Team</button>
          <button class="drag-btn" aria-label="选择Drag式比赛">Drag</button>
          <button class="music-draw-btn" aria-label="直接抽取音乐">
            Music
          </button>
        </section>
      </main>
      <footer>
        <p>&copy; 2025 Y.Stage-X YUKAORI</p>
      </footer>
    </div>
    <script src="../js/select.js"></script>
  </body>
</html>
